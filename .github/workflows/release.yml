name: Publish package on version change

on:
  push:
    branches:
      - main
    paths:
      - package.json

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Detect version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          BEFORE_SHA="${{ github.event.before }}"
          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREV_VERSION=""
          if git cat-file -e "${BEFORE_SHA}:package.json" 2>/dev/null; then
            PREV_VERSION=$(git show "${BEFORE_SHA}:package.json" | node -e "let data='';process.stdin.on('data',c=>data+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(data).version || '')}catch{console.log('')}})")
          fi

          if [[ "$CURRENT_VERSION" != "$PREV_VERSION" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check if tag exists
        id: tag
        if: steps.version.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ steps.version.outputs.current }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true' && steps.tag.outputs.exists != 'true'
        run: pnpm publish --no-git-checks --access public --provenance

      - name: Create and push git tag
        if: steps.version.outputs.changed == 'true' && steps.tag.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          TAG="v${{ steps.version.outputs.current }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
